name: api_for_bank
services:
  backend:
    image: BankApp
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:18
    container_name: postgresBankApp
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  db-data:
